<!DOCTYPE html>
<html>
<head>
	<title>UPC Auto Login Options</title>
	<link rel="stylesheet" href="options.css">
</head>
<body>

<h2>Login Credentials</h2>
<div>
	<p>
		Username:
		<input id="username" type="text"></input>
	</p>
	<p>
		Password:
		<input id="password" type="password"></input>
	</p>
	<p>
		2FA Secret:
		<input id="secret2fa" type="text"></input>
	</p>
</div>

<h2>Options</h2>
<div>
	<p>
		Atenea auto redirect:
		<input type="checkbox" id="ateneaRedirect"/>
	</p>
	<p>
		eBIB auto redirect:
		<input type="checkbox" id="ebibRedirect"/>
	</p>
	<p>
		mWiki auto redirect:
		<input type="checkbox" id="mwikiRedirect"/>
	</p>
</div>

<h2>Other platforms</h2>
<div>
	<p>
		e-status:
		<input type="checkbox" id="estatus"/>
	</p>
	<p>
		LearnSQL2:
		<input type="checkbox" id="learnsql2"/>
	</p>
	<p>
		mWiki:
		<input type="checkbox" id="mwiki"/>
	</p>
</div>


<div class="buttons">
	<p>
		<button id="save" type="submit">Save</button>
	</p>
	
	<p>
		<button id="clear">Clear</button>
	</p>
</div>

<div id="status"></div>

<script src="options.js"></script>
</body>
</html>
